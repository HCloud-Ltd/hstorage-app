name: バグ報告
description: 不具合やエラーの報告
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告ありがとうございます。以下の項目をできる限り記入してください。

  - type: dropdown
    id: platform
    attributes:
      label: プラットフォーム
      options:
        - Web（ブラウザ）
        - iOS アプリ
        - Android アプリ
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: アプリバージョン
      description: アプリの場合、設定画面からバージョンを確認してください
      placeholder: "例: 1.2.3"

  - type: input
    id: os-version
    attributes:
      label: OS / ブラウザ
      placeholder: "例: iOS 18.4 / Chrome 134"

  - type: textarea
    id: description
    attributes:
      label: 現象
      description: 何が起きたかを具体的に記述してください
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 問題を再現する手順を記述してください
      value: |
        1.
        2.
        3.

  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どうなるべきかを記述してください

  - type: textarea
    id: screenshots
    attributes:
      label: スクリーンショット / 動画
      description: 問題を示す画像や動画があれば添付してください
