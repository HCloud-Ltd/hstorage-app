name: 機能リクエスト
description: 新機能や改善の提案
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能リクエストありがとうございます。

  - type: dropdown
    id: platform
    attributes:
      label: 対象プラットフォーム
      multiple: true
      options:
        - Web（ブラウザ）
        - iOS アプリ
        - Android アプリ
        - すべて
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 背景・課題
      description: この機能が必要な理由や、現在困っていることを記述してください
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能・改善を希望するか記述してください
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に検討した方法があれば記述してください

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: 参考画像やリンクなどがあれば添付してください
